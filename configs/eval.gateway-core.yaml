run:
  timeout_seconds: 60
  concurrency: 2
  attempts: 2
  repeat_per_case: 3
  stream: false
  performance_targets:
    p95_latency_seconds: 8

targets:
  - name: gateway_under_test
    base_url: https://gateway.example.com/v1
    api_key_env: LLM_GATEWAY_API_KEY
    model: gpt-4o-mini
    headers:
      X-Eval-Source: llm-gateway-eval
    params:
      temperature: 0
      max_tokens: 800
    pricing:
      input_per_million: 0.15
      output_per_million: 0.60
      currency: USD

  - name: direct_openai_baseline
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    model: gpt-4o-mini
    params:
      temperature: 0
      max_tokens: 800
    pricing:
      input_per_million: 0.15
      output_per_million: 0.60
      currency: USD

report:
  title: Gateway Core Evaluation Report
  weights:
    quality: 0.20
    reliability: 0.30
    performance: 0.15
    cost: 0.10
    security_compliance: 0.20
    operations: 0.05

